<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nexus AI</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  
  <main class="landing-container">
    <h1 class="brand-title">Hello, I'm Nexus</h1>
    <p class="sub-text">How can I help you explore GNIET today?</p>

    <div class="input-wrapper">
      <input id="landingInput" class="main-input" type="text" placeholder="Ask anything..." />
      <button id="landingBtn" class="send-icon-btn">
        <img src="assets/send_icon.png" alt="Send">
      </button>
    </div>

    <div class="suggestions-grid">
      <div class="suggestion-card">Tell me about the CSE Department</div>
      <div class="suggestion-card">What is the breakfast menu?</div>
      <div class="suggestion-card">Who is Akshay Bankar?</div>
      <div class="suggestion-card">Placement opportunities at GNIET</div>
    </div>
  </main>

  <script src="js/script.js">
    
  </script>
</body>
</html>
