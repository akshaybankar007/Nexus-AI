<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-root" class="gemini-layout">
        
        <aside class="sidebar">
            <button id="newChatBtn" class="new-chat-btn">
                <span class="material-symbols-outlined">add</span>
                <span class="btn-text">New chat</span>
            </button>
            <div class="recent-chats">
                <p class="section-title">Recent</p>
                <div id="historyContainer" class="history-list">
                    </div>
            </div>
            <div class="sidebar-footer">
                <button class="icon-btn"><span class="material-symbols-outlined">help</span></button>
                <button class="icon-btn"><span class="material-symbols-outlined">history</span></button>
                <button class="icon-btn"><span class="material-symbols-outlined">settings</span></button>
            </div>
        </aside>

        <div id="sidebarOverlay" class="sidebar-overlay"></div>

        <main class="main-view">
            <header class="top-nav">
                <div class="nav-left">
                    <button id="menuBtn" class="icon-btn mobile-menu-btn" style="display: none;">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <span class="brand-logo">Nexus</span>
                </div>
                <div class="user-avatar">A</div>
            </header>

            <div id="chatContainer" class="chat-container">
                
                <div id="landingView" class="greeting-screen">
                    <h1 class="greeting-text">
                        <span class="gradient-text">Hello, Akshay.</span><br>
                        <span class="sub-greeting">What can I help you with?</span>
                    </h1>
                    
                    <div class="suggestions-grid">
                        <div class="suggestion-card" data-query="Tell me about the CSE Department">
                            <p>Tell me about world</p>
                            <span class="material-symbols-outlined icon">school</span>
                        </div>
                        <div class="suggestion-card" data-query="What is the breakfast menu?">
                            <p>What to cook?</p>
                            <span class="material-symbols-outlined icon">restaurant</span>
                        </div>
                        <div class="suggestion-card" data-query="Placement opportunities at GNIET">
                            <p>Best IIT's in India</p>
                            <span class="material-symbols-outlined icon">work</span>
                        </div>
                        <div class="suggestion-card" data-query="Who is the HOD of CSE?">
                            <p>Who is the Prime Minister of India</p>
                            <span class="material-symbols-outlined icon">person</span>
                        </div>
                    </div>
                </div>

                <div id="messageStream" class="message-stream" style="display: none;">
                    </div>
            </div>

            <div class="input-section">
                <div class="input-wrapper">
                    <input id="mainInput" class="chat-input" type="text" placeholder="Enter a prompt here" autocomplete="off" />
                    <div class="input-actions">
                        <button class="icon-btn"><span class="material-symbols-outlined">mic</span></button>
                        <button id="sendBtn" class="send-btn">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                </div>
                <p class="disclaimer">Nexus can make mistakes. Verify important information.</p>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
